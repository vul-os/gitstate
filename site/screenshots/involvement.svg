<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" width="1000" height="640" role="img" aria-label="gitstate Involvement view — contribution shown as texture across six dimensions per contributor, with merged identities and agent-versus-human commit share, never a single leaderboard rank">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0E0E10"/><stop offset="1" stop-color="#09090B"/></linearGradient>
    <linearGradient id="acc3" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2DD4BF"/><stop offset="1" stop-color="#0D9488"/></linearGradient>
    <style>text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;fill:#FAFAFA}.muted{fill:#A1A1AA}.faint{fill:#71717A}.mono{font-family:ui-monospace,"SF Mono",Menlo,monospace}.h{font-weight:700}.big{font-weight:800}</style>
  </defs>
  <rect width="1000" height="640" rx="14" fill="url(#bg3)"/>
  <rect x="0.5" y="0.5" width="999" height="639" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.09"/>
  <circle cx="26" cy="24" r="6" fill="#26262b"/><circle cx="46" cy="24" r="6" fill="#26262b"/><circle cx="66" cy="24" r="6" fill="#26262b"/>

  <g transform="translate(40,72)">
    <text class="big" font-size="24">Involvement</text>
    <text y="26" class="muted" font-size="13.5">texture across six dimensions · never a ranking, never a bonus formula</text>
  </g>

  <!-- three contributor cards, each a radar-ish bar cluster -->
  <g transform="translate(40,120)">
    <!-- helper: each card -->
    <!-- card A -->
    <g>
      <rect width="296" height="440" rx="12" fill="#131316" stroke="#ffffff" stroke-opacity="0.08"/>
      <circle cx="34" cy="42" r="18" fill="#2DD4BF" fill-opacity="0.18"/><text x="34" y="47" text-anchor="middle" class="h" font-size="15">AD</text>
      <text x="62" y="38" class="h" font-size="16">Ada</text>
      <text x="62" y="56" class="faint mono" font-size="11">ada · human</text>
      <g transform="translate(24,92)" font-size="12">
        <text y="4" class="muted">Shipped</text><rect x="96" y="-8" width="150" height="9" rx="4" fill="#26262b"/><rect x="96" y="-8" width="108" height="9" rx="4" fill="url(#acc3)"/>
        <g transform="translate(0,32)"><text y="4" class="muted">Review</text><rect x="96" y="-8" width="150" height="9" rx="4" fill="#26262b"/><rect x="96" y="-8" width="132" height="9" rx="4" fill="url(#acc3)"/></g>
        <g transform="translate(0,64)"><text y="4" class="muted">Effort</text><rect x="96" y="-8" width="150" height="9" rx="4" fill="#26262b"/><rect x="96" y="-8" width="90" height="9" rx="4" fill="url(#acc3)"/></g>
        <g transform="translate(0,96)"><text y="4" class="muted">Quality</text><rect x="96" y="-8" width="150" height="9" rx="4" fill="#26262b"/><rect x="96" y="-8" width="138" height="9" rx="4" fill="url(#acc3)"/></g>
        <g transform="translate(0,128)"><text y="4" class="muted">Ownership</text><rect x="96" y="-8" width="150" height="9" rx="4" fill="#26262b"/><rect x="96" y="-8" width="120" height="9" rx="4" fill="url(#acc3)"/></g>
        <g transform="translate(0,160)"><text y="4" class="muted">Durability</text><rect x="96" y="-8" width="150" height="9" rx="4" fill="#26262b"/><rect x="96" y="-8" width="102" height="9" rx="4" fill="url(#acc3)"/></g>
      </g>
      <line x1="24" y1="300" x2="272" y2="300" stroke="#ffffff" stroke-opacity="0.07"/>
      <text x="24" y="326" class="faint" font-size="11.5">MERGED IDENTITIES</text>
      <text x="24" y="348" class="muted mono" font-size="11">ada@x.io · ada@work</text>
      <text x="24" y="380" class="faint" font-size="11.5">AGENT SHARE</text>
      <rect x="24" y="392" width="248" height="8" rx="4" fill="#26262b"/><rect x="24" y="392" width="30" height="8" rx="4" fill="#38bdf8"/>
      <text x="24" y="422" class="muted" font-size="11.5">12% agent · 88% human</text>
    </g>
    <!-- card B -->
    <g transform="translate(312,0)">
      <rect width="296" height="440" rx="12" fill="#131316" stroke="#ffffff" stroke-opacity="0.08"/>
      <circle cx="34" cy="42" r="18" fill="#a78bfa" fill-opacity="0.2"/><text x="34" y="47" text-anchor="middle" class="h" font-size="15">LN</text>
      <text x="62" y="38" class="h" font-size="16">Lin</text>
      <text x="62" y="56" class="faint mono" font-size="11">lin · human</text>
      <g transform="translate(24,92)" font-size="12">
        <text y="4" class="muted">Shipped</text><rect x="96" y="-8" width="150" height="9" rx="4" fill="#26262b"/><rect x="96" y="-8" width="72" height="9" rx="4" fill="url(#acc3)"/>
        <g transform="translate(0,32)"><text y="4" class="muted">Review</text><rect x="96" y="-8" width="150" height="9" rx="4" fill="#26262b"/><rect x="96" y="-8" width="142" height="9" rx="4" fill="url(#acc3)"/></g>
        <g transform="translate(0,64)"><text y="4" class="muted">Effort</text><rect x="96" y="-8" width="150" height="9" rx="4" fill="#26262b"/><rect x="96" y="-8" width="114" height="9" rx="4" fill="url(#acc3)"/></g>
        <g transform="translate(0,96)"><text y="4" class="muted">Quality</text><rect x="96" y="-8" width="150" height="9" rx="4" fill="#26262b"/><rect x="96" y="-8" width="126" height="9" rx="4" fill="url(#acc3)"/></g>
        <g transform="translate(0,128)"><text y="4" class="muted">Ownership</text><rect x="96" y="-8" width="150" height="9" rx="4" fill="#26262b"/><rect x="96" y="-8" width="66" height="9" rx="4" fill="url(#acc3)"/></g>
        <g transform="translate(0,160)"><text y="4" class="muted">Durability</text><rect x="96" y="-8" width="150" height="9" rx="4" fill="#26262b"/><rect x="96" y="-8" width="130" height="9" rx="4" fill="url(#acc3)"/></g>
      </g>
      <line x1="24" y1="300" x2="272" y2="300" stroke="#ffffff" stroke-opacity="0.07"/>
      <text x="24" y="326" class="faint" font-size="11.5">MERGED IDENTITIES</text>
      <text x="24" y="348" class="muted mono" font-size="11">lin@x.io</text>
      <text x="24" y="380" class="faint" font-size="11.5">AGENT SHARE</text>
      <rect x="24" y="392" width="248" height="8" rx="4" fill="#26262b"/><rect x="24" y="392" width="12" height="8" rx="4" fill="#38bdf8"/>
      <text x="24" y="422" class="muted" font-size="11.5">reviewer-heavy — not zeroed</text>
    </g>
    <!-- card C agent -->
    <g transform="translate(624,0)">
      <rect width="296" height="440" rx="12" fill="#131316" stroke="#38bdf8" stroke-opacity="0.3"/>
      <circle cx="34" cy="42" r="18" fill="#38bdf8" fill-opacity="0.2"/><text x="34" y="47" text-anchor="middle" class="h" font-size="13">CC</text>
      <text x="62" y="38" class="h" font-size="16">claude-code</text>
      <text x="62" y="56" class="faint mono" font-size="11">agent identity</text>
      <g transform="translate(24,92)" font-size="12">
        <text y="4" class="muted">Shipped</text><rect x="96" y="-8" width="150" height="9" rx="4" fill="#26262b"/><rect x="96" y="-8" width="126" height="9" rx="4" fill="#38bdf8"/>
        <g transform="translate(0,32)"><text y="4" class="muted">Review</text><rect x="96" y="-8" width="150" height="9" rx="4" fill="#26262b"/><rect x="96" y="-8" width="18" height="9" rx="4" fill="#38bdf8"/></g>
        <g transform="translate(0,64)"><text y="4" class="muted">Effort</text><rect x="96" y="-8" width="150" height="9" rx="4" fill="#26262b"/><rect x="96" y="-8" width="84" height="9" rx="4" fill="#38bdf8"/></g>
        <g transform="translate(0,96)"><text y="4" class="muted">Quality</text><rect x="96" y="-8" width="150" height="9" rx="4" fill="#26262b"/><rect x="96" y="-8" width="96" height="9" rx="4" fill="#38bdf8"/></g>
        <g transform="translate(0,128)"><text y="4" class="muted">Ownership</text><rect x="96" y="-8" width="150" height="9" rx="4" fill="#26262b"/><rect x="96" y="-8" width="48" height="9" rx="4" fill="#38bdf8"/></g>
        <g transform="translate(0,160)"><text y="4" class="muted">Durability</text><rect x="96" y="-8" width="150" height="9" rx="4" fill="#26262b"/><rect x="96" y="-8" width="60" height="9" rx="4" fill="#38bdf8"/></g>
      </g>
      <line x1="24" y1="300" x2="272" y2="300" stroke="#ffffff" stroke-opacity="0.07"/>
      <text x="24" y="326" class="faint" font-size="11.5">AGENT-NATIVE</text>
      <text x="24" y="348" class="muted" font-size="12">Autonomous runs are first-class;</text>
      <text x="24" y="366" class="muted" font-size="12">humans are the oversight layer.</text>
      <rect x="24" y="388" width="248" height="8" rx="4" fill="#26262b"/><rect x="24" y="388" width="248" height="8" rx="4" fill="#38bdf8"/>
      <text x="24" y="422" class="muted" font-size="11.5">100% agent commits</text>
    </g>
  </g>
</svg>
