<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" role="img" aria-label="gitstate desktop app — Project state dashboard showing DORA cycle time, open and merged PRs, and six-dimension contribution texture, all derived from git">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E0E10"/><stop offset="1" stop-color="#09090B"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2DD4BF"/><stop offset="1" stop-color="#0D9488"/>
    </linearGradient>
    <style>
      text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;fill:#FAFAFA}
      .muted{fill:#A1A1AA}.faint{fill:#71717A}
      .h{font-weight:700}.big{font-weight:800}
      .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace}
    </style>
  </defs>
  <rect width="1200" height="760" rx="14" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="759" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.09"/>

  <!-- window bar -->
  <circle cx="26" cy="24" r="6" fill="#26262b"/><circle cx="46" cy="24" r="6" fill="#26262b"/><circle cx="66" cy="24" r="6" fill="#26262b"/>
  <text x="600" y="28" text-anchor="middle" class="faint" font-size="13">gitstate</text>

  <!-- sidebar -->
  <rect x="0" y="49" width="212" height="711" fill="#0C0C0E"/>
  <line x1="212" y1="49" x2="212" y2="760" stroke="#ffffff" stroke-opacity="0.07"/>
  <g transform="translate(24,78)">
    <rect x="-2" y="-2" width="30" height="30" rx="7" fill="#0A0A0A"/>
    <path d="M8 3 V23" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round"/>
    <circle cx="8" cy="22" r="2.4" fill="#2DD4BF"/>
    <text x="40" y="19" class="h" font-size="17">git<tspan fill="#2DD4BF">state</tspan></text>
  </g>
  <g font-size="14.5" transform="translate(24,140)">
    <rect x="-8" y="-16" width="188" height="34" rx="8" fill="#2DD4BF" fill-opacity="0.14"/>
    <text y="6" fill="#FAFAFA" class="h">Project state</text>
    <text y="46" class="muted">Involvement</text>
    <text y="86" class="muted">Work items</text>
    <text y="126" class="muted">Contexts</text>
    <text y="166" class="muted">Categories</text>
    <text y="206" class="muted">Contributors</text>
    <text y="246" class="muted">Taxonomy</text>
  </g>
  <g transform="translate(24,700)" font-size="12.5">
    <circle cx="6" cy="-4" r="5" fill="#2DD4BF"/>
    <text x="20" y="0" class="muted">Local · offline</text>
    <text x="0" y="24" class="faint">P2P sync: 2 peers</text>
  </g>

  <!-- main -->
  <g transform="translate(244,78)">
    <text class="big" font-size="26">Project state</text>
    <text y="26" class="muted" font-size="14">vul-os/gitstate · derived from git + forge · scanned 4m ago</text>

    <!-- KPI row -->
    <g transform="translate(0,58)">
      <!-- card 1 cycle time -->
      <g>
        <rect width="220" height="118" rx="12" fill="#131316" stroke="#ffffff" stroke-opacity="0.08"/>
        <text x="18" y="30" class="faint" font-size="12">CYCLE TIME · DORA p50</text>
        <text x="18" y="72" class="big" font-size="34">41.2<tspan font-size="16" class="muted"> h</tspan></text>
        <text x="18" y="98" class="muted" font-size="12.5">p90 190h · first-commit → merge</text>
      </g>
      <!-- card 2 -->
      <g transform="translate(240,0)">
        <rect width="220" height="118" rx="12" fill="#131316" stroke="#ffffff" stroke-opacity="0.08"/>
        <text x="18" y="30" class="faint" font-size="12">IN PROGRESS / DONE</text>
        <text x="18" y="72" class="big" font-size="34">3<tspan class="muted" font-size="22"> / 208</tspan></text>
        <text x="18" y="98" class="muted" font-size="12.5">open PR ⇒ in progress</text>
      </g>
      <!-- card 3 -->
      <g transform="translate(480,0)">
        <rect width="220" height="118" rx="12" fill="#131316" stroke="#ffffff" stroke-opacity="0.08"/>
        <text x="18" y="30" class="faint" font-size="12">CHANGE FAILURE RATE</text>
        <text x="18" y="72" class="big" font-size="34">7<tspan font-size="16" class="muted">%</tspan></text>
        <text x="18" y="98" class="muted" font-size="12.5">reverts + SZZ fix-links</text>
      </g>
    </g>

    <!-- PR/issue bar -->
    <g transform="translate(0,196)">
      <rect width="700" height="96" rx="12" fill="#131316" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="18" y="30" class="faint" font-size="12">PULL REQUESTS</text>
      <text x="18" y="62" class="big" font-size="24">120 <tspan class="muted" font-size="14">merged</tspan></text>
      <text x="150" y="62" font-size="18" fill="#2DD4BF">3 <tspan class="muted" font-size="13">open</tspan></text>
      <text x="240" y="62" font-size="18" class="muted">1 <tspan font-size="13">draft</tspan></text>
      <text x="360" y="30" class="faint" font-size="12">ISSUES</text>
      <text x="360" y="62" class="big" font-size="24">88 <tspan class="muted" font-size="14">closed</tspan></text>
      <text x="480" y="62" font-size="18" class="muted">9 <tspan font-size="13">open</tspan></text>
      <!-- progress -->
      <rect x="18" y="78" width="664" height="6" rx="3" fill="#26262b"/>
      <rect x="18" y="78" width="612" height="6" rx="3" fill="url(#acc)"/>
    </g>

    <!-- six-dimension texture -->
    <g transform="translate(0,316)">
      <rect width="700" height="316" rx="12" fill="#131316" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="18" y="34" class="h" font-size="16">Contribution — six dimensions</text>
      <text x="18" y="56" class="muted" font-size="12.5">texture across the cohort, never a single rank · window 90d</text>

      <!-- rows -->
      <g transform="translate(18,86)" font-size="13">
        <!-- Shipped -->
        <text y="4" class="muted">Shipped</text>
        <rect x="120" y="-8" width="500" height="10" rx="5" fill="#26262b"/>
        <rect x="120" y="-8" width="360" height="10" rx="5" fill="url(#acc)"/>
        <text x="632" y="4" class="mono faint" font-size="12">72</text>
        <!-- Review -->
        <g transform="translate(0,36)">
          <text y="4" class="muted">Review</text>
          <rect x="120" y="-8" width="500" height="10" rx="5" fill="#26262b"/>
          <rect x="120" y="-8" width="200" height="10" rx="5" fill="url(#acc)"/>
          <text x="632" y="4" class="mono faint" font-size="12">40</text>
        </g>
        <!-- Effort -->
        <g transform="translate(0,72)">
          <text y="4" class="muted">Effort</text>
          <rect x="120" y="-8" width="500" height="10" rx="5" fill="#26262b"/>
          <rect x="120" y="-8" width="278" height="10" rx="5" fill="url(#acc)"/>
          <text x="632" y="4" class="mono faint" font-size="12">55</text>
        </g>
        <!-- Quality -->
        <g transform="translate(0,108)">
          <text y="4" class="muted">Quality</text>
          <rect x="120" y="-8" width="500" height="10" rx="5" fill="#26262b"/>
          <rect x="120" y="-8" width="440" height="10" rx="5" fill="url(#acc)"/>
          <text x="632" y="4" class="mono faint" font-size="12">88</text>
        </g>
        <!-- Ownership -->
        <g transform="translate(0,144)">
          <text y="4" class="muted">Ownership</text>
          <rect x="120" y="-8" width="500" height="10" rx="5" fill="#26262b"/>
          <rect x="120" y="-8" width="165" height="10" rx="5" fill="url(#acc)"/>
          <text x="632" y="4" class="mono faint" font-size="12">33</text>
        </g>
        <!-- Durability -->
        <g transform="translate(0,180)">
          <text y="4" class="muted">Durability</text>
          <rect x="120" y="-8" width="500" height="10" rx="5" fill="#26262b"/>
          <rect x="120" y="-8" width="305" height="10" rx="5" fill="url(#acc)"/>
          <text x="632" y="4" class="mono faint" font-size="12">61</text>
        </g>
      </g>
      <text x="18" y="300" class="faint" font-size="11.5">durability = surviving ÷ authored lines (git blame) · quality inverts reverts + bug-intros · agent share 20%</text>
    </g>

    <!-- right column: classified work items -->
    <g transform="translate(716,58)">
      <rect width="196" height="574" rx="12" fill="#131316" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="16" y="30" class="h" font-size="15">Latest work</text>
      <text x="16" y="50" class="faint" font-size="11.5">classified locally</text>
      <g transform="translate(16,74)" font-size="12.5">
        <!-- item -->
        <g>
          <rect x="0" y="0" width="60" height="19" rx="5" fill="#2DD4BF" fill-opacity="0.16"/>
          <text x="9" y="14" fill="#2DD4BF" font-size="11">feature.api</text>
          <text x="0" y="40" class="muted mono" font-size="11">#412</text>
          <text x="40" y="40" font-size="12">Streaming diff walk</text>
        </g>
        <g transform="translate(0,58)">
          <rect x="0" y="0" width="46" height="19" rx="5" fill="#f59e0b" fill-opacity="0.16"/>
          <text x="9" y="14" fill="#f59e0b" font-size="11">bugfix</text>
          <text x="0" y="40" class="muted mono" font-size="11">#409</text>
          <text x="40" y="40" font-size="12">Blame cap overflow</text>
        </g>
        <g transform="translate(0,116)">
          <rect x="0" y="0" width="52" height="19" rx="5" fill="#a78bfa" fill-opacity="0.18"/>
          <text x="9" y="14" fill="#a78bfa" font-size="11">refactor</text>
          <text x="0" y="40" class="muted mono" font-size="11">#404</text>
          <text x="40" y="40" font-size="12">Split derive.rs</text>
        </g>
        <g transform="translate(0,174)">
          <rect x="0" y="0" width="42" height="19" rx="5" fill="#22c55e" fill-opacity="0.18"/>
          <text x="9" y="14" fill="#22c55e" font-size="11">test</text>
          <text x="0" y="40" class="muted mono" font-size="11">#401</text>
          <text x="40" y="40" font-size="12">SZZ fixtures</text>
        </g>
        <g transform="translate(0,232)">
          <rect x="0" y="0" width="48" height="19" rx="5" fill="#38bdf8" fill-opacity="0.18"/>
          <text x="9" y="14" fill="#38bdf8" font-size="11">agent</text>
          <text x="0" y="40" class="muted mono" font-size="11">a1f2</text>
          <text x="40" y="40" font-size="12">Bump deps</text>
        </g>
      </g>
      <g transform="translate(16,420)">
        <line x1="0" y1="0" x2="164" y2="0" stroke="#ffffff" stroke-opacity="0.08"/>
        <text y="26" class="faint" font-size="11.5">EFFORT (LLM-judged)</text>
        <text y="54" class="big" font-size="22">5<tspan class="muted" font-size="13"> / 13</tspan></text>
        <text y="76" class="muted" font-size="11.5">difficulty, not line count</text>
        <text y="104" class="faint" font-size="11">heuristic fallback if no LLM</text>
      </g>
    </g>
  </g>
</svg>
