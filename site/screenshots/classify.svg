<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" width="1000" height="640" role="img" aria-label="gitstate classification view — work items tagged against a signed versioned taxonomy by a local LLM with per-item confidence and rationale, learning this box's conventions from feedback, with a deterministic heuristic fallback">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0E0E10"/><stop offset="1" stop-color="#09090B"/></linearGradient>
    <style>text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;fill:#FAFAFA}.muted{fill:#A1A1AA}.faint{fill:#71717A}.mono{font-family:ui-monospace,"SF Mono",Menlo,monospace}.h{font-weight:700}.big{font-weight:800}</style>
  </defs>
  <rect width="1000" height="640" rx="14" fill="url(#bg4)"/>
  <rect x="0.5" y="0.5" width="999" height="639" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.09"/>
  <circle cx="26" cy="24" r="6" fill="#26262b"/><circle cx="46" cy="24" r="6" fill="#26262b"/><circle cx="66" cy="24" r="6" fill="#26262b"/>

  <g transform="translate(40,72)">
    <text class="big" font-size="24">Classify</text>
    <text y="26" class="muted" font-size="13.5">local LLM against a signed taxonomy · rationale + confidence · learns your conventions</text>
  </g>

  <!-- table -->
  <g transform="translate(40,120)">
    <rect width="600" height="452" rx="12" fill="#131316" stroke="#ffffff" stroke-opacity="0.08"/>
    <g transform="translate(20,32)" font-size="11.5" class="faint">
      <text x="0">ITEM</text><text x="90">CATEGORY</text><text x="270">CONF.</text><text x="350">RATIONALE</text>
    </g>
    <line x1="20" y1="44" x2="580" y2="44" stroke="#ffffff" stroke-opacity="0.07"/>
    <!-- rows -->
    <g transform="translate(20,74)" font-size="12.5">
      <text x="0" y="4" class="mono muted">#412</text>
      <rect x="90" y="-11" width="76" height="20" rx="6" fill="#2DD4BF" fill-opacity="0.16"/><text x="100" y="4" fill="#2DD4BF" font-size="11.5">feature.api</text>
      <rect x="270" y="-9" width="54" height="7" rx="3.5" fill="#26262b"/><rect x="270" y="-9" width="49" height="7" rx="3.5" fill="#2DD4BF"/><text x="332" y="3" class="faint mono" font-size="11">.91</text>
      <text x="350" y="4" class="muted" font-size="11.5">adds streaming diff endpoint</text>

      <g transform="translate(0,50)">
        <text x="0" y="4" class="mono muted">#409</text>
        <rect x="90" y="-11" width="52" height="20" rx="6" fill="#f59e0b" fill-opacity="0.16"/><text x="100" y="4" fill="#f59e0b" font-size="11.5">bugfix</text>
        <rect x="270" y="-9" width="54" height="7" rx="3.5" fill="#26262b"/><rect x="270" y="-9" width="44" height="7" rx="3.5" fill="#2DD4BF"/><text x="332" y="3" class="faint mono" font-size="11">.82</text>
        <text x="350" y="4" class="muted" font-size="11.5">fixes blame cap overflow</text>
      </g>
      <g transform="translate(0,100)">
        <text x="0" y="4" class="mono muted">#404</text>
        <rect x="90" y="-11" width="60" height="20" rx="6" fill="#a78bfa" fill-opacity="0.18"/><text x="100" y="4" fill="#a78bfa" font-size="11.5">refactor</text>
        <rect x="270" y="-9" width="54" height="7" rx="3.5" fill="#26262b"/><rect x="270" y="-9" width="40" height="7" rx="3.5" fill="#2DD4BF"/><text x="332" y="3" class="faint mono" font-size="11">.74</text>
        <text x="350" y="4" class="muted" font-size="11.5">splits derive.rs, no behaviour</text>
      </g>
      <g transform="translate(0,150)">
        <text x="0" y="4" class="mono muted">#401</text>
        <rect x="90" y="-11" width="40" height="20" rx="6" fill="#22c55e" fill-opacity="0.18"/><text x="100" y="4" fill="#22c55e" font-size="11.5">test</text>
        <rect x="270" y="-9" width="54" height="7" rx="3.5" fill="#26262b"/><rect x="270" y="-9" width="52" height="7" rx="3.5" fill="#2DD4BF"/><text x="332" y="3" class="faint mono" font-size="11">.96</text>
        <text x="350" y="4" class="muted" font-size="11.5">SZZ fixtures only</text>
      </g>
      <g transform="translate(0,200)">
        <text x="0" y="4" class="mono muted">#398</text>
        <rect x="90" y="-11" width="46" height="20" rx="6" fill="#ef4444" fill-opacity="0.18"/><text x="100" y="4" fill="#ef4444" font-size="11.5">security</text>
        <rect x="270" y="-9" width="54" height="7" rx="3.5" fill="#26262b"/><rect x="270" y="-9" width="47" height="7" rx="3.5" fill="#2DD4BF"/><text x="332" y="3" class="faint mono" font-size="11">.88</text>
        <text x="350" y="4" class="muted" font-size="11.5">SSRF guard on forge REST</text>
      </g>
      <g transform="translate(0,250)">
        <text x="0" y="4" class="mono muted">a1f2</text>
        <rect x="90" y="-11" width="48" height="20" rx="6" fill="#38bdf8" fill-opacity="0.18"/><text x="100" y="4" fill="#38bdf8" font-size="11.5">agent</text>
        <rect x="270" y="-9" width="54" height="7" rx="3.5" fill="#26262b"/><rect x="270" y="-9" width="38" height="7" rx="3.5" fill="#2DD4BF"/><text x="332" y="3" class="faint mono" font-size="11">.70</text>
        <text x="350" y="4" class="muted" font-size="11.5">autonomous dep bump</text>
      </g>
      <g transform="translate(0,300)">
        <text x="0" y="4" class="mono muted">#392</text>
        <rect x="90" y="-11" width="42" height="20" rx="6" fill="#94a3b8" fill-opacity="0.2"/><text x="100" y="4" fill="#cbd5e1" font-size="11.5">docs</text>
        <rect x="270" y="-9" width="54" height="7" rx="3.5" fill="#26262b"/><rect x="270" y="-9" width="53" height="7" rx="3.5" fill="#2DD4BF"/><text x="332" y="3" class="faint mono" font-size="11">.98</text>
        <text x="350" y="4" class="muted" font-size="11.5">architecture.md rewrite</text>
      </g>
    </g>
  </g>

  <!-- right: taxonomy + engine -->
  <g transform="translate(660,120)">
    <rect width="300" height="216" rx="12" fill="#131316" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="20" y="34" class="h" font-size="15">Signed taxonomy</text>
    <g transform="translate(20,52)">
      <rect x="0" y="0" width="34" height="34" rx="8" fill="#2DD4BF" fill-opacity="0.14"/>
      <path d="M12 17 l4 4 l8 -9" stroke="#2DD4BF" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="66" y="70" class="muted" font-size="12.5">ed25519 · verified</text>
    <text x="66" y="88" class="faint mono" font-size="11">gitstate.taxonomy/v1 · 1.0.0</text>
    <text x="20" y="126" class="faint" font-size="11.5">19 categories · pinned key</text>
    <text x="20" y="150" class="muted" font-size="12">Data, not a service. Fails closed</text>
    <text x="20" y="168" class="muted" font-size="12">to local-only if the sig is bad.</text>
    <text x="20" y="196" class="mono faint" font-size="10.5">id sha256 3f9a…c2 ✓</text>
  </g>

  <g transform="translate(660,352)">
    <rect width="300" height="220" rx="12" fill="#131316" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="20" y="34" class="h" font-size="15">Local learning</text>
    <text x="20" y="56" class="faint" font-size="11.5">replaces pooled fine-tuning</text>
    <text x="20" y="86" class="muted" font-size="12.5">Correct a label once and this box</text>
    <text x="20" y="104" class="muted" font-size="12.5">re-ranks future items to match —</text>
    <text x="20" y="122" class="muted" font-size="12.5">priors stay on your disk.</text>
    <line x1="20" y1="144" x2="280" y2="144" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="20" y="170" class="faint" font-size="11.5">CLASSIFIER</text>
    <rect x="20" y="182" width="120" height="24" rx="12" fill="#2DD4BF" fill-opacity="0.14"/><text x="80" y="198" text-anchor="middle" fill="#2DD4BF" font-size="11.5">LLM (llmux)</text>
    <rect x="150" y="182" width="130" height="24" rx="12" fill="#18181B"/><text x="215" y="198" text-anchor="middle" class="muted" font-size="11.5">heuristic fallback</text>
  </g>
</svg>
