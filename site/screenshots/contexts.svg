<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" width="1000" height="640" role="img" aria-label="gitstate Contexts view — saved working sets of repos, pull requests, tags and notes, shared peer-to-peer over CRDT with two connected peers and no central server">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0E0E10"/><stop offset="1" stop-color="#09090B"/></linearGradient>
    <style>text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;fill:#FAFAFA}.muted{fill:#A1A1AA}.faint{fill:#71717A}.mono{font-family:ui-monospace,"SF Mono",Menlo,monospace}.h{font-weight:700}.big{font-weight:800}</style>
  </defs>
  <rect width="1000" height="640" rx="14" fill="url(#bg2)"/>
  <rect x="0.5" y="0.5" width="999" height="639" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.09"/>
  <circle cx="26" cy="24" r="6" fill="#26262b"/><circle cx="46" cy="24" r="6" fill="#26262b"/><circle cx="66" cy="24" r="6" fill="#26262b"/>

  <g transform="translate(40,72)">
    <text class="big" font-size="24">Contexts</text>
    <text y="26" class="muted" font-size="13.5">saved working sets — the sharable unit · syncs P2P over CRDT, no central server</text>

    <!-- context cards -->
    <g transform="translate(0,56)">
      <rect width="590" height="150" rx="12" fill="#131316" stroke="#2DD4BF" stroke-opacity="0.35"/>
      <text x="20" y="34" class="h" font-size="17">Q3 storage refactor</text>
      <rect x="470" y="18" width="100" height="22" rx="11" fill="#2DD4BF" fill-opacity="0.14"/>
      <text x="520" y="33" text-anchor="middle" fill="#2DD4BF" font-size="11.5">shared · 2 peers</text>
      <text x="20" y="58" class="muted" font-size="13">Migrate the store seam to WAL + tighten the CRDT op log.</text>
      <g transform="translate(20,80)" font-size="12" class="mono">
        <rect width="150" height="22" rx="6" fill="#18181B"/><text x="12" y="15" class="muted">vul-os/gitstate</text>
        <rect x="162" width="120" height="22" rx="6" fill="#18181B"/><text x="174" y="15" class="muted">vul-os/wede</text>
        <rect x="294" width="70" height="22" rx="6" fill="#2DD4BF" fill-opacity="0.14"/><text x="306" y="15" fill="#2DD4BF">PR #412</text>
        <rect x="374" width="70" height="22" rx="6" fill="#2DD4BF" fill-opacity="0.14"/><text x="386" y="15" fill="#2DD4BF">PR #388</text>
      </g>
      <g transform="translate(20,116)" font-size="11.5">
        <rect width="70" height="20" rx="10" fill="#a78bfa" fill-opacity="0.16"/><text x="35" y="14" text-anchor="middle" fill="#a78bfa">refactor</text>
        <rect x="80" width="60" height="20" rx="10" fill="#a78bfa" fill-opacity="0.16"/><text x="110" y="14" text-anchor="middle" fill="#a78bfa">storage</text>
      </g>
    </g>

    <g transform="translate(0,222)">
      <rect width="590" height="96" rx="12" fill="#131316" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="20" y="34" class="h" font-size="17">Release 0.1 audit</text>
      <text x="20" y="58" class="muted" font-size="13">Everything touching the daemon API before tagging.</text>
      <g transform="translate(20,72)" font-size="12" class="mono">
        <rect width="150" height="22" rx="6" fill="#18181B"/><text x="12" y="15" class="muted">vul-os/gitstate</text>
        <rect x="162" width="70" height="22" rx="6" fill="#2DD4BF" fill-opacity="0.14"/><text x="174" y="15" fill="#2DD4BF">PR #404</text>
      </g>
    </g>

    <g transform="translate(0,334)">
      <rect width="590" height="96" rx="12" fill="#131316" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="20" y="34" class="h" font-size="17">Local-only scratch</text>
      <text x="20" y="58" class="muted" font-size="13">Personal working set — never shared, stays on this box.</text>
      <text x="20" y="82" class="faint mono" font-size="12">3 repos · not published</text>
    </g>
  </g>

  <!-- P2P panel -->
  <g transform="translate(670,128)">
    <rect width="290" height="454" rx="12" fill="#131316" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="20" y="34" class="h" font-size="15">Peer-to-peer sync</text>
    <text x="20" y="54" class="faint" font-size="11.5">CRDT · LWW + OR-Set · no server</text>

    <!-- node graph -->
    <g transform="translate(145,180)">
      <line x1="0" y1="0" x2="-95" y2="-70" stroke="#2DD4BF" stroke-opacity="0.5" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="95" y2="-70" stroke="#2DD4BF" stroke-opacity="0.5" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="0" y2="95" stroke="#2DD4BF" stroke-opacity="0.3" stroke-width="1.5" stroke-dasharray="4 4"/>
      <circle cx="0" cy="0" r="30" fill="#2DD4BF" fill-opacity="0.16" stroke="#2DD4BF" stroke-width="1.5"/>
      <text x="0" y="4" text-anchor="middle" font-size="12" class="h">you</text>
      <circle cx="-95" cy="-70" r="22" fill="#18181B" stroke="#ffffff" stroke-opacity="0.15"/>
      <text x="-95" y="-66" text-anchor="middle" font-size="10.5" class="muted">peer a</text>
      <circle cx="95" cy="-70" r="22" fill="#18181B" stroke="#ffffff" stroke-opacity="0.15"/>
      <text x="95" y="-66" text-anchor="middle" font-size="10.5" class="muted">peer b</text>
      <circle cx="0" cy="95" r="20" fill="#0C0C0E" stroke="#ffffff" stroke-opacity="0.1" stroke-dasharray="3 3"/>
      <text x="0" y="99" text-anchor="middle" font-size="10" class="faint">offline</text>
    </g>

    <g transform="translate(20,340)" font-size="12.5">
      <text class="faint" font-size="11.5">CONVERGENCE</text>
      <text y="26" class="muted">Ops applied <tspan fill="#FAFAFA" class="mono">1,204</tspan></text>
      <text y="50" class="muted">Conflicts resolved <tspan fill="#FAFAFA" class="mono">7</tspan></text>
      <text y="74" class="muted">Last op <tspan fill="#FAFAFA" class="mono">2s ago</tspan></text>
    </g>
  </g>
</svg>
