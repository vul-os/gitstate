# fly.toml — gitstate fly.io deployment config
# App name: override with `fly apps create <name>` or set FLY_APP env.
# Secrets (never committed):
#   fly secrets set DATABASE_URL="..." JWT_SIGNING_KEY="..." \
#     PAYSTACK_SECRET_KEY="..." EXCHANGE_API_KEY="..."
# Deploy:
#   fly deploy               (builds Dockerfile; uses -tags ee via Dockerfile)
# See: https://fly.io/docs/reference/configuration/

app = "gitstate"
primary_region = "jnb"   # Johannesburg — closest to ZAR billing customers

[build]
  dockerfile = "Dockerfile"

[env]
  # Non-secret runtime config. Secrets come from `fly secrets`.
  APP_ENV      = "production"
  HTTP_ADDR    = ":8080"
  # Set PUBLIC_URL via: fly secrets set PUBLIC_URL="https://gitstate.fly.dev"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period   = "10s"
    interval       = "15s"
    method         = "GET"
    path           = "/healthz"
    port           = 8080
    protocol       = "http"
    timeout        = "5s"
    restart_limit  = 0
    type           = "http"
