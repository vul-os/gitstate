name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace
      # gitstate-sync is intentionally excluded from the default workspace
      # (see [workspace].exclude in Cargo.toml) so a plain `cargo build` never
      # pulls in P2P / dmtap deps. Assert that invariant holds in CI.
      - name: Assert sync crate is excluded from the workspace
        run: |
          if cargo metadata --no-deps --format-version 1 \
              | grep -q '"name":"gitstate-sync"'; then
            echo "::error::gitstate-sync must be excluded from the default workspace"
            exit 1
          fi
          echo "ok: gitstate-sync is not a default-workspace member"

  rust-sync:
    name: Rust (sync crate, standalone)
    runs-on: ubuntu-latest
    # The P2P CRDT crate is excluded from the workspace and gated behind the
    # optional `sync-dmtap` feature. Build it on its own so it stays green
    # without ever touching a bare `cargo build`.
    defaults:
      run:
        working-directory: crates/gitstate-sync
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build (default)
        run: cargo build
      - name: Build (sync-dmtap feature)
        run: cargo build --features sync-dmtap
      - name: Test
        run: cargo test

  frontend:
    name: Frontend (lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  e2e:
    name: E2E (seeded daemon, dark + light)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Install chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      # The daemon serves web/dist, so the SPA must be built before it starts.
      - name: Build SPA
        working-directory: web
        run: npm run build

      # Deterministic synthetic dataset — the suite asserts against real rows,
      # and its preflight fails loudly if the database is empty.
      - name: Seed the demo dataset
        run: cargo run -p gitstate-cli -- seed --demo
        env:
          GITSTATE_DATA_DIR: ${{ runner.temp }}/gitstate-data

      - name: Start the daemon
        run: |
          cargo run -p gitstate-cli -- serve --port 8080 &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8080/health >/dev/null; then
              echo "daemon up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "::error::daemon did not become healthy within 60s"; exit 1
        env:
          GITSTATE_DATA_DIR: ${{ runner.temp }}/gitstate-data

      - name: Run the e2e suite
        working-directory: web
        run: npm run test:e2e
        env:
          BASE_URL: http://127.0.0.1:8080
